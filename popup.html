<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      width: 240px;
      background: #fff;
    }
    h1 {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: #FF0211;
      padding: 10px 14px;
    }
    .list {
      padding: 8px 0;
    }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .item:last-child { border-bottom: none; }
    .label {
      font-size: 13px;
      color: #333;
    }
    .sub {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    /* トグルスイッチ */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #FF0211; }
    input:checked + .slider::before { transform: translateX(18px); }
    .master {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #fafafa;
      border-bottom: 2px solid #e0e0e0;
    }
    .master .label {
      font-size: 13px;
      font-weight: 700;
      color: #333;
    }
    .price-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
      gap: 4px;
    }
    .price-row input[type="number"] {
      width: 72px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 11px;
      color: #333;
    }
    .price-row span {
      font-size: 11px;
      color: #999;
    }
    .price-row.hidden { display: none; }
  </style>
</head>
<body>
  <h1>Mercari フィルター設定</h1>
  <label class="master">
    <span class="label">すべて有効</span>
    <div class="switch">
      <input type="checkbox" id="master" checked>
      <span class="slider"></span>
    </div>
  </label>
  <div class="list">
    <label class="item">
      <div>
        <div class="label">新しい順</div>
        <div class="sub">出品日時の降順でソート</div>
      </div>
      <div class="switch">
        <input type="checkbox" id="sort" checked>
        <span class="slider"></span>
      </div>
    </label>
    <label class="item">
      <div>
        <div class="label">個人出品のみ</div>
        <div class="sub">ショップ出品を除外</div>
      </div>
      <div class="switch">
        <input type="checkbox" id="item_types" checked>
        <span class="slider"></span>
      </div>
    </label>
    <label class="item">
      <div>
        <div class="label">売切を表示</div>
        <div class="sub">売り切れ商品も含める</div>
      </div>
      <div class="switch">
        <input type="checkbox" id="status" checked>
        <span class="slider"></span>
      </div>
    </label>
    <div class="item">
      <div>
        <div class="label">最低価格フィルター</div>
        <div class="price-row" id="price-input-area">
          <input type="number" id="price_min_value" min="0" step="100" value="3000">
          <span>円以上</span>
        </div>
      </div>
      <label class="switch">
        <input type="checkbox" id="price_min" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="item">
      <div>
        <div class="label">最高価格フィルター</div>
        <div class="price-row" id="price-max-input-area">
          <input type="number" id="price_max_value" min="0" step="100" value="10000">
          <span>円以下</span>
        </div>
      </div>
      <label class="switch">
        <input type="checkbox" id="price_max">
        <span class="slider"></span>
      </label>
    </div>
    <label class="item">
      <div>
        <div class="label">フレーズ検索</div>
        <div class="sub">検索語を " " で囲む</div>
      </div>
      <div class="switch">
        <input type="checkbox" id="keyword_quote" checked>
        <span class="slider"></span>
      </div>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
